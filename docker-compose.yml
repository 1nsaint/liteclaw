# LiteClaw gateway (your fork of OpenClaw for self-hosted/Ollama).
# Build from source, then run. Ollama on host: use host.docker.internal.
services:
  liteclaw:
    build: .
    image: liteclaw:local
    container_name: liteclaw
    restart: unless-stopped
    ports:
      - "18789:18789"   # gateway port (default)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # So the gateway is reachable from host (pair TUI, browser)
      - OPENCLAW_GATEWAY_PORT=18789
      # Ollama runs on host; container must use host.docker.internal (overrides config if missing)
      - OPENCLAW_OLLAMA_BASE_URL=http://host.docker.internal:11434
    # Override default loopback bind so host can connect (seed config allows Control UI)
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
    volumes:
      - liteclaw-data:/home/node/.openclaw

volumes:
  liteclaw-data: {}
